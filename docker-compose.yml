services:
  api:
    build: .
    image: ai-vehicle-safety-classifier:local
    ports:
      - "127.0.0.1:5000:5000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    environment:
      RATE_LIMIT: "60 per minute"
      LOG_LEVEL: INFO
    restart: unless-stopped
