name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-runtime.txt
            requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
      - name: Format, lint, static and dependency analysis
        run: |
          ruff format --check predict.py mcp_adapter.py n8n_webhook.py benchmarks
          ruff check predict.py mcp_adapter.py n8n_webhook.py benchmarks tests
          bandit -q -r predict.py mcp_adapter.py n8n_webhook.py
          pip-audit -r requirements-runtime.txt
      - name: Unit, integration, API, edge and regression tests
        run: pytest
      - name: Reproducible performance benchmark
        run: python benchmarks/run_benchmark.py --iterations 1000 --warmup 50 --output benchmarks/latest.json
      - name: License inventory
        run: pip-licenses --format=json --output-file=benchmarks/licenses.json
      - uses: actions/upload-artifact@v4
        with:
          name: quality-evidence
          path: |
            coverage.xml
            benchmarks/latest.json
            benchmarks/licenses.json
          if-no-files-found: error

  deployment-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t vehicle-safety:${{ github.sha }} .
      - name: Verify container identity, startup, health and API
        run: |
          test "$(docker run --rm vehicle-safety:${{ github.sha }} id -u)" = "10001"
          docker run -d --name api -p 5000:5000 --memory=512m --cpus=1 vehicle-safety:${{ github.sha }}
          trap 'docker logs api; docker rm -f api' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:5000/health && break
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:5000/ready
          curl --fail --silent -X POST http://127.0.0.1:5000/n8n/classify             -H 'content-type: application/json'             -d '{"input":{"weather":"clear","visibility":"high","traffic":"light","driver_state":"alert"}}'
      - name: Validate production manifests
        run: |
          docker run --rm -v "$PWD:/work" ghcr.io/yannh/kubeconform:v0.7.0             -strict -summary /work/deployment.yaml /work/service.yaml /work/network-policy.yaml
          ! grep -q "image:.*:latest" deployment.yaml
          grep -q "readOnlyRootFilesystem: true" deployment.yaml
          grep -q "automountServiceAccountToken: false" deployment.yaml
